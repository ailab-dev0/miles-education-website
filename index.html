<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miles Education | Making Accountants AI-Ready. Globally.</title>
    <meta name="description" content="From CPA and CMA to AI-ready professionals with global careers. Miles builds future-ready accountants for India, the United States, and the world." />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://ik.imagekit.io" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Preload LCP hero images — must be discoverable in initial HTML -->
    <link rel="preload" as="image" href="https://ik.imagekit.io/mileseducation/miles_website/home/new/bg-hero-mob.webp?tr=w-375,q-50,f-webp" media="(max-width: 768px)" fetchpriority="high" />
    <link rel="preload" as="image" href="https://ik.imagekit.io/mileseducation/miles_website/home/new/bg-hero-desk.webp" media="(min-width: 769px)" fetchpriority="high" />

    <!-- Fonts loaded after first paint via JS to avoid render blocking -->
    <noscript><link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" /></noscript>

    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="https://ik.imagekit.io/mileseducation/miles_website/accounting/cpa/milesLogo.webp?tr=w-32,h-32" />

    <!-- OG Meta -->
    <meta property="og:title" content="Miles Education | Making Accountants AI-Ready. Globally." />
    <meta property="og:description" content="From CPA and CMA to AI-ready professionals with global careers." />
    <meta property="og:image" content="https://ik.imagekit.io/mileseducation/miles_website/home_new/home_thumbnail_new.webp" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#191919" />

    <!-- Critical inline styles for instant rendering -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#fff;overflow-x:hidden;color:#333}
      img{max-width:100%;height:auto;display:block}
      a{text-decoration:none}
      #root{min-height:100vh}
      .visit_txt{background:linear-gradient(92deg,#39f 6.8%,#ffba08 99.51%);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:600;line-height:94%;overflow:visible}
      .main_container{max-width:1340px;padding-left:1rem;padding-right:1rem;margin:0 auto}
      /* Shell styles */
      .shell-ticker{background:#061A2F;height:24px;overflow:hidden}
      .shell-ticker p{color:#fff;font-size:12px;text-align:center;line-height:24px;margin:0;white-space:nowrap}
      .shell-nav{background:#191919;height:56px}
      .shell-hero{position:relative;min-height:520px;overflow:hidden;background:#061A2F}
      .shell-hero-content{position:relative;z-index:10;max-width:1280px;margin:0 auto;padding:48px 16px;text-align:center}
      .shell-hero h1{color:#fff;font-size:28px;font-weight:600;line-height:1.15;letter-spacing:-1.76px;margin:0 0 4px}
      .shell-hero .gold{display:block;font-size:34px;font-weight:600;color:#FFBA08;letter-spacing:1.8px}
      .shell-hero .desc{color:rgba(255,255,255,0.9);font-size:14px;margin-top:16px;line-height:1.5}
      .shell-hero .cta{display:inline-block;background:#FFBA08;color:#000;font-weight:700;padding:10px 24px;border-radius:50px;font-size:14px;margin-top:24px;text-decoration:none}
      /* Above-fold nav/header critical styles */
      .bg-\[\#191919\]{background:#191919}
      .bg-\[\#061A2F\]{background:#061A2F}
      .text-white{color:#fff}
      .fixed{position:fixed}
      .relative{position:relative}
      .flex{display:flex}
      .hidden{display:none}
      .items-center{align-items:center}
      .justify-between{justify-content:space-between}
      .w-full{width:100%}
      .z-\[999\]{z-index:999}
      .overflow-hidden{overflow:hidden}
      @media(min-width:768px){
        .shell-hero h1{font-size:44px}
        .shell-hero .gold{font-size:60px}
        .shell-hero .desc{font-size:16px}
        .shell-hero-content{text-align:center;padding:60px 24px}
        .md\:block{display:block}
        .md\:hidden{display:none}
        .md\:flex{display:flex}
      }
      @media(min-width:1024px){
        .main_container{padding-left:1.75rem;padding-right:1.75rem}
        .lg\:flex{display:flex}
        .lg\:hidden{display:none}
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Static shell for instant FCP/LCP — React replaces this on mount -->
      <div class="shell-ticker"><p>Become an AI-Ready CPA or CMA | Free webinar with Varun Jain | Register Now</p></div>
      <div class="shell-nav"></div>
      <div class="shell-hero">
        <div class="shell-hero-content">
          <h1>Making Accountants</h1>
          <span class="gold">AI-Ready. Globally.</span>
          <p class="desc">From CPA and CMA to AI-ready professionals with global careers.<br>Miles builds future-ready accountants for India, the United States, and the world.</p>
          <a class="cta" href="#/">Become an AI-Ready Accountant</a>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
